<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>惠买 · 数据看板</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
<style>
/* ===== 登录页样式 ===== */
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f0f2f5; }

.login-screen {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; padding: 20px;
}
.login-card {
  background: #fff; border-radius: 16px; padding: 48px 40px 40px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center;
}
.login-icon { font-size: 48px; margin-bottom: 12px; }
.login-card h1 { font-size: 22px; color: #1a3a4a; margin-bottom: 4px; font-weight: 600; }
.login-card .sub { font-size: 13px; color: #999; margin-bottom: 32px; }
.login-card input[type="password"] {
  width: 100%; padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 10px;
  font-size: 16px; text-align: center; outline: none; transition: border 0.2s;
}
.login-card input[type="password"]:focus { border-color: #2d6a7e; }
.login-card button {
  width: 100%; padding: 12px; margin-top: 16px;
  background: linear-gradient(135deg, #1a3a4a 0%, #2d6a7e 100%);
  color: #fff; border: none; border-radius: 10px; font-size: 16px; font-weight: 600;
  cursor: pointer; transition: opacity 0.2s;
}
.login-card button:hover { opacity: 0.9; }
.login-error { color: #e74c3c; font-size: 13px; margin-top: 12px; min-height: 20px; }
.login-hint { font-size: 12px; color: #bbb; margin-top: 20px; }

/* ===== 内容页样式（解密后使用） ===== */
.header { background: linear-gradient(135deg, #1a3a4a 0%, #2d6a7e 100%); color: #fff; padding: 32px; text-align: center; }
.header h1 { font-size: 26px; font-weight: 600; margin-bottom: 6px; }
.header .sub { font-size: 13px; opacity: 0.7; }
.container { max-width: 800px; margin: 0 auto; padding: 30px 20px; }
.cards { display: flex; flex-direction: column; gap: 16px; }
.card {
  display: flex; align-items: center; gap: 18px;
  background: #fff; padding: 22px 28px; border-radius: 12px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  text-decoration: none; color: #333;
  transition: all 0.2s;
  border-left: 4px solid transparent;
}
.card:hover { transform: translateX(6px); box-shadow: 0 4px 16px rgba(0,0,0,0.1); border-left-color: #2d6a7e; }
.card-icon { font-size: 36px; flex-shrink: 0; width: 56px; text-align: center; }
.card-content { flex: 1; }
.card-title { font-size: 17px; font-weight: 600; margin-bottom: 4px; color: #1a3a4a; }
.card-desc { font-size: 13px; color: #888; }
.card-arrow { font-size: 20px; color: #ccc; flex-shrink: 0; }
.divider { display: flex; align-items: center; gap: 12px; margin: 10px 0; }
.divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #e0e0e0; }
.divider span { font-size: 12px; color: #aaa; }
.footer { text-align: center; padding: 24px; font-size: 12px; color: #aaa; }
.footer a { color: #2d6a7e; text-decoration: none; }

/* 退出按钮 */
.logout-btn {
  position: fixed; bottom: 20px; right: 20px; z-index: 999;
  background: rgba(0,0,0,0.5); color: #fff; border: none;
  padding: 8px 16px; border-radius: 20px; font-size: 12px;
  cursor: pointer; transition: background 0.2s;
}
.logout-btn:hover { background: rgba(0,0,0,0.7); }
</style>
</head>
<body>

<!-- ===== 登录界面 ===== -->
<div id="loginScreen" class="login-screen">
  <div class="login-card">
    <div class="login-icon">🔐</div>
    <h1>惠买数据看板</h1>
    <p class="sub">银发经济私域 · 数据驱动运营</p>
    <input type="password" id="pwInput" placeholder="请输入访问密码" autofocus
           onkeydown="if(event.key==='Enter')tryLogin()">
    <button onclick="tryLogin()">进入看板</button>
    <div id="loginError" class="login-error"></div>
    <p class="login-hint">如需访问权限，请联系张华刚</p>
  </div>
</div>

<!-- ===== 内容区域（解密后填充） ===== -->
<div id="contentScreen" style="display:none"></div>
<button id="logoutBtn" class="logout-btn" style="display:none" onclick="doLogout()">退出登录</button>

// 解密并显示内容
function tryLogin() {
  const pw = document.getElementById('pwInput').value.trim();
  const errEl = document.getElementById('loginError');
  if (!pw) { errEl.textContent = '请输入密码'; return; }

  try {
    const decrypted = CryptoJS.AES.decrypt(ENCRYPTED, pw).toString(CryptoJS.enc.Utf8);
    // 解密成功的话会得到以 <div 开头的 HTML 内容
    if (decrypted && decrypted.indexOf('<div') === 0) {
      // 登录成功
      sessionStorage.setItem('huimai_auth', 'true');
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('contentScreen').style.display = 'block';
      document.getElementById('contentScreen').innerHTML = decrypted;
      document.getElementById('logoutBtn').style.display = 'block';
    } else {
      errEl.textContent = '密码错误，请重试';
      document.getElementById('pwInput').value = '';
      document.getElementById('pwInput').focus();
    }
  } catch(e) {
    errEl.textContent = '密码错误，请重试';
    document.getElementById('pwInput').value = '';
    document.getElementById('pwInput').focus();
  }
}

// 退出登录
function doLogout() {
  sessionStorage.removeItem('huimai_auth');
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('contentScreen').style.display = 'none';
  document.getElementById('contentScreen').innerHTML = '';
  document.getElementById('logoutBtn').style.display = 'none';
  document.getElementById('pwInput').value = '';
  document.getElementById('pwInput').focus();
}

// 页面加载时检查是否已登录
(function() {
  if (sessionStorage.getItem('huimai_auth') === 'true') {
    // 已登录，直接显示内容（但需要重新解密，所以要求再输入密码或从session取）
    // 为安全起见，刷新页面后需要重新输入密码
    sessionStorage.removeItem('huimai_auth');
  }
})();
</script>

</body>
</html>
