<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>惠买 · 数据看板导航</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f0f2f5; color: #333; min-height: 100vh; }

.header { background: linear-gradient(135deg, #1a3a4a 0%, #2d6a7e 100%); color: #fff; padding: 32px; text-align: center; }
.header h1 { font-size: 26px; font-weight: 600; margin-bottom: 6px; }
.header .sub { font-size: 13px; opacity: 0.7; }

.container { max-width: 800px; margin: 0 auto; padding: 30px 20px; }

.cards { display: flex; flex-direction: column; gap: 16px; }

.card {
  display: flex; align-items: center; gap: 18px;
  background: #fff; padding: 22px 28px; border-radius: 12px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  text-decoration: none; color: #333;
  transition: all 0.2s;
  border-left: 4px solid transparent;
}
.card:hover { transform: translateX(6px); box-shadow: 0 4px 16px rgba(0,0,0,0.1); border-left-color: #2d6a7e; }

.card-icon { font-size: 36px; flex-shrink: 0; width: 56px; text-align: center; }

.card-content { flex: 1; }
.card-title { font-size: 17px; font-weight: 600; margin-bottom: 4px; color: #1a3a4a; }
.card-desc { font-size: 13px; color: #888; }

.card-arrow { font-size: 20px; color: #ccc; flex-shrink: 0; }

.divider { display: flex; align-items: center; gap: 12px; margin: 10px 0; }
.divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #e0e0e0; }
.divider span { font-size: 12px; color: #aaa; }

.footer { text-align: center; padding: 24px; font-size: 12px; color: #aaa; }
.footer a { color: #2d6a7e; text-decoration: none; }
</style>
</head>
<body>

<div class="header">
  <h1>📊 惠买数据看板</h1>
  <div class="sub">银发经济私域 · 数据驱动运营</div>
</div>

<div class="container">
  <div class="cards">

    <a href="orders.html" class="card">
      <div class="card-icon">🦪</div>
      <div class="card-content">
        <div class="card-title">海参订单 · 门店会员明细</div>
        <div class="card-desc">门店消费排名、会员购买记录、可搜索展开查看详情</div>
      </div>
      <div class="card-arrow">→</div>
    </a>

    <a href="report.html" class="card">
      <div class="card-icon">📈</div>
      <div class="card-content">
        <div class="card-title">半年总结报告看板</div>
        <div class="card-desc">2026上半年数据总览、趋势图表、业绩分析</div>
      </div>
      <div class="card-arrow">→</div>
    </a>

    <a href="2026高考志愿方案_597分31800名.html" class="card">
      <div class="card-icon">🎓</div>
      <div class="card-content">
        <div class="card-title">高考志愿方案</div>
        <div class="card-desc">597分·全省31800名 · 冲稳保院校推荐</div>
      </div>
      <div class="card-arrow">→</div>
    </a>

    <div class="divider"><span>更多看板即将上线</span></div>

  </div>
</div>

<div class="footer">
  张华刚 · 区域运营 <span style="margin:0 8px">|</span> 数据更新于 2026-07-03
</div>

</body>
</html>
