.header { background: linear-gradient(135deg, #1a3a4a 0%, #2d6a7e 100%); color: #fff; padding: 24px 32px; }
.header h1 { font-size: 24px; font-weight: 600; margin-bottom: 4px; }
.header .sub { font-size: 13px; opacity: 0.8; }
.container { max-width: 1400px; margin: 0 auto; padding: 20px 24px; }

/* Panel */
.panel { background: #fff; border-radius: 10px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
.panel h3 { font-size: 15px; font-weight: 600; margin-bottom: 14px; color: #1a3a4a; display: flex; align-items: center; gap: 8px; }
.panel h3 .badge { font-size: 12px; background: #e8f4f8; color: #2d6a7e; padding: 2px 8px; border-radius: 10px; font-weight: 400; }

/* Table */
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { background: #f7f8fa; padding: 10px 12px; text-align: left; font-weight: 600; color: #555; border-bottom: 2px solid #e8e8e8; white-space: nowrap; }
td { padding: 10px 12px; border-bottom: 1px solid #f0f0f0; }
tr:hover { background: #fafbfc; }
.store-row { cursor: pointer; transition: background 0.15s; }
.store-row:hover { background: #e8f4f8; }
.store-row .arrow { transition: transform 0.2s; display: inline-block; }
.store-row.expanded .arrow { transform: rotate(90deg); }
.rank-num { display: inline-flex; align-items: center; justify-content: center; width: 24px; height: 24px; border-radius: 50%; font-size: 12px; font-weight: 700; }
.rank-1 { background: #fef3e2; color: #e67e22; }
.rank-2 { background: #f0f0f0; color: #777; }
.rank-3 { background: #fdf2e9; color: #cd6155; }

/* Member sub-table */
.member-detail { display: none; }
.member-detail.show { display: table-row; }
.member-detail td { padding: 0; background: #fafcfd; }
.member-inner { padding: 12px 24px 16px; }
.member-inner table { font-size: 12px; }
.member-inner th { background: #eef4f7; font-size: 12px; padding: 8px 10px; }
.member-inner td { padding: 7px 10px; font-size: 12px; }

/* Search */
.search-box { display: flex; gap: 10px; margin-bottom: 14px; }
.search-box input { flex: 1; padding: 8px 14px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; outline: none; }
.search-box input:focus { border-color: #2d6a7e; }
.search-box select { padding: 8px 14px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; outline: none; background: #fff; }

.footer { text-align: center; padding: 20px; font-size: 12px; color: #aaa; }
</style>
</head>
<body>

<div class="header">
  <h1>🦪 海参订单 · 门店会员明细</h1>
  <div class="sub" id="headerInfo"></div>
</div>

<div class="container">

  <div class="panel">
    <h3>🏪 门店会员明细 <span class="badge" id="storeCount"></span></h3>
    <div class="search-box">
      <input type="text" id="storeSearch" placeholder="🔍 搜索门店名称..." oninput="filterStores()">
      <select id="storeSort" onchange="filterStores()">
        <option value="amount">按消费额排序</option>
        <option value="members">按会员数排序</option>
        <option value="name">按门店名称排序</option>
      </select>
    </div>
    <div style="overflow-x: auto;">
      <table>
        <thead>
          <tr>
            <th>#</th><th>门店名称</th><th>会员数</th><th>总订单</th><th>总消费</th><th>TOP会员</th><th>人均消费</th><th></th>
          </tr>
        </thead>
        <tbody id="storeTableBody"></tbody>
      </table>
    </div>
  </div>

</div>

<div class="footer">数据截至 2026-06-12 · 仅统计已完成有效订单 · 每家店展示 TOP10 或 50% 会员（取最大值）</div>

<script>
// ============ 头部信息 ============
(function renderHeader() {
  const d = REPORT_DATA.overview;
  document.getElementById('headerInfo').textContent =
    `数据范围：${d.dateRange} | 有效订单 ${d.validOrders} 单 / ¥${d.validAmount.toLocaleString()} | 会员 ${d.validMembers} 人 | 门店 ${REPORT_DATA.stores.length} 家`;
})();

// ============ 门店明细表 ============
let currentStoreData = [];

function buildStoreRows(data) {
  const storeMembers = REPORT_DATA.storeMembers;
  return data.map((s, i) => {
    const sm = storeMembers[s.门店];
    const avg = s.会员数 > 0 ? Math.round(s.总消费 / s.会员数) : 0;
    let rankCls = i < 1 ? 'rank-1' : i < 2 ? 'rank-2' : i < 3 ? 'rank-3' : '';
    return { ...s, rank: i+1, rankCls, avg, sm };
  });
}

function filterStores() {
  const search = document.getElementById('storeSearch').value.toLowerCase();
  const sort = document.getElementById('storeSort').value;
  let data = REPORT_DATA.stores.slice();

  if (search) data = data.filter(s => s.门店.toLowerCase().includes(search));

  if (sort === 'amount') data.sort((a, b) => b.总消费 - a.总消费);
  else if (sort === 'members') data.sort((a, b) => b.会员数 - a.会员数);
  else data.sort((a, b) => a.门店.localeCompare(b.门店));

  currentStoreData = buildStoreRows(data);
  renderStoreTable();
}

function renderStoreTable() {
  const tbody = document.getElementById('storeTableBody');
  document.getElementById('storeCount').textContent = `共 ${currentStoreData.length} 家门店`;

  tbody.innerHTML = currentStoreData.map((s, idx) => {
    const sm = s.sm;
    let memberRows = '';
    if (sm && sm.会员列表) {
      memberRows = sm.会员列表.map(m => `
        <tr>
          <td>${m.层级图标} ${m.昵称}</td>
          <td>${m.编号}</td>
          <td>${m.手机号}</td>
          <td>${m.次数}次</td>
          <td>¥${m.消费.toLocaleString()}</td>
          <td>${m.日期.slice(0,3).join('<br>')}${m.日期.length>3?'<br>...等'+m.日期.length+'次':''}</td>
          <td>${m.品类.join('<br>')}</td>
        </tr>
      `).join('');
    }

    const info = sm ? `展示 ${sm.展示数}/${sm.会员总数} 人` : '';

    return `
      <tr class="store-row" data-idx="${idx}">
        <td><span class="rank-num ${s.rankCls}">${s.rank}</span></td>
        <td><strong>${s.门店}</strong></td>
        <td>${s.会员数}人</td>
        <td>${s.总订单}单</td>
        <td>¥${s.总消费.toLocaleString()}</td>
        <td>${s.TOP会员} (¥${s.TOP消费.toLocaleString()})</td>
        <td>¥${s.avg.toLocaleString()}</td>
        <td><span class="arrow">▶</span> ${info}</td>
      </tr>
      <tr class="member-detail" id="detail-${idx}">
        <td colspan="8">
          <div class="member-inner">
            <table>
              <thead><tr><th>昵称</th><th>编号</th><th>手机号</th><th>次数</th><th>累计消费</th><th>购买日期</th><th>涉及品类</th></tr></thead>
              <tbody>${memberRows}</tbody>
            </table>
          </div>
        </td>
      </tr>
    `;
  }).join('');

  // 事件委托处理点击
  tbody.onclick = function(e) {
    const row = e.target.closest('.store-row');
    if (!row) return;
    const detailRow = row.nextElementSibling;
    if (!detailRow || !detailRow.classList.contains('member-detail')) return;

    const isOpen = detailRow.classList.contains('show');
    tbody.querySelectorAll('.member-detail.show').forEach(r => r.classList.remove('show'));
    tbody.querySelectorAll('.store-row.expanded').forEach(r => r.classList.remove('expanded'));

    if (!isOpen) {
      detailRow.classList.add('show');
      row.classList.add('expanded');
    }
  };
}

// Init
filterStores();
</script>

</body>
</html>
