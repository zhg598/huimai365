.store-row.expanded { background: #f5f8fa; border-bottom-color: #e0e0e0; }

.store-metrics .sm-item .l { font-size: 10px; color: #888; }

.store-row.expanded .store-expand-icon { transform: rotate(180deg); }

/* 展开详情 */
.store-detail { display: none; padding: 0 16px 16px 16px; border-bottom: 1px solid #e0e0e0; background: #fafbfc; }

.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.detail-dims { grid-column: 1/-1; }
.dim-row { display: flex; align-items: center; gap: 8px; margin: 6px 0; font-size: 12px; }
.dim-label { width: 80px; text-align: right; color: #888; flex-shrink: 0; }

.dim-bar-fill { height: 100%; border-radius: 8px; transition: width 0.3s; }
.dim-score { width: 50px; font-weight: 600; font-size: 12px; flex-shrink: 0; }
.detail-metrics { display: grid; grid-template-columns: repeat(5,1fr); gap: 8px; font-size: 12px; }

.detail-metrics .dm .v { font-weight: 600; font-size: 14px; }
.detail-metrics .dm .l { font-size: 10px; color: #888; }
.detail-notes { margin-top: 10px; font-size: 11px; }

.footer { text-align: center; padding: 20px; font-size: 11px; color: #aaa; }

  sups.forEach(function(s){ var o=document.createElement("option"); o.value=s; o.textContent=s; sel.appendChild(o); });
})();

// ======== Store List ========
var expandedStore = null;

function renderList(){
  var grade=document.getElementById("filterGrade").value;
  var sup=document.getElementById("filterSup").value;
  var search=document.getElementById("filterSearch").value.toLowerCase();
  var stores=DATA.stores;
  if(grade) stores=stores.filter(function(s){return s.grade===grade;});
  if(sup) stores=stores.filter(function(s){return s.supervisor===sup;});
  if(search) stores=stores.filter(function(s){return s.name.toLowerCase().indexOf(search)>=0;});
  stores.sort(function(a,b){return a.totalScore-b.totalScore;});
  document.getElementById("filterCount").textContent="共 "+stores.length+" 家";

  var dims=["A销售规模","B销售趋势","C会员基础","D复购留存","E退货风险","F集中度","G直播运营"];
  var dimLabels=["A销售","B趋势","C会员","D复购","E退货","F集中","G直播"];
  var maxS=[18,18,15,18,13,8,10];
  var dimColors=["#2d6a7e","#3b9c6e","#5b8fb4","#f0a040","#e85d47","#7b5ea7","#c44569"];

  var html='';
  stores.forEach(function(s,idx){
    var sc=s.totalScore>=75?"score-h":s.totalScore>=60?"score-w":s.totalScore>=45?"score-a":"score-d";
    var m=s.metrics;
    var refColor=m["退货率"]>30?"#c53030":m["退货率"]>20?"#e8733a":"#3b9c6e";

    html+='<div class="store-row" id="row-'+idx+'" onclick="toggleDetail('+idx+',''+s.name.replace(/'/g,"\'")+'')">';
    html+='<div class="store-rank">'+(idx+1)+'</div>';
    html+='<div class="store-score '+sc+'">'+s.totalScore+'</div>';
    html+='<div class="store-name-col"><div class="sn">'+s.name+'</div><div class="sm">'+s.grade+' · '+s.supervisor+' · '+s.city+'</div></div>';
    html+='<div class="store-metrics">';
    html+='<div class="sm-item"><div class="v">'+fmoney(m["月均净销售"])+'</div><div class="l">月均销售</div></div>';
    html+='<div class="sm-item"><div class="v">'+fnum(m["月均会员"])+'</div><div class="l">月均会员</div></div>';
    html+='<div class="sm-item"><div class="v" style="color:'+refColor+'">'+m["退货率"]+'%</div><div class="l">退货率</div></div>';
    html+='<div class="sm-item"><div class="v">¥'+fnum(m["客单价"])+'</div><div class="l">客单价</div></div>';
    html+='<div class="sm-item"><div class="v">'+m["多单率"]+'%</div><div class="l">多单率</div></div>';
    html+='<div class="sm-item"><div class="v">'+m["跨月留存"]+'%</div><div class="l">跨月留存</div></div>';
    html+='<div class="sm-item"><div class="v">'+fnum(m["直播场次"])+'</div><div class="l">直播场次</div></div>';
    html+='</div>';
    html+='<div class="store-expand-icon">▼</div>';
    html+='</div>';

    // Detail panel
    html+='<div class="store-detail" id="detail-'+idx+'">';
    html+='<div class="detail-grid"><div class="detail-dims">';
    for(var i=0;i<dims.length;i++){
      var pct=s.scores[dims[i]]/maxS[i]*100;
      html+='<div class="dim-row">';
      html+='<div class="dim-label">'+dimLabels[i]+'</div>';
      html+='<div class="dim-bar-wrap"><div class="dim-bar-fill" style="width:'+pct+'%;background:'+dimColors[i]+'"></div></div>';
      html+='<div class="dim-score">'+s.scores[dims[i]]+'/'+maxS[i]+'</div>';
      html+='</div>';
    }
    html+='</div></div>'; // detail-dims

    html+='<div class="detail-metrics">';
    html+='<div class="dm"><div class="v">'+fmoney(m["月均净销售"])+'</div><div class="l">月均净销售</div></div>';
    html+='<div class="dm"><div class="v">'+fnum(m["月均会员"])+'</div><div class="l">月均会员</div></div>';
    html+='<div class="dm"><div class="v" style="color:'+refColor+'">'+m["退货率"]+'%</div><div class="l">退货率</div></div>';
    html+='<div class="dm"><div class="v">¥'+fnum(m["客单价"])+'</div><div class="l">客单价</div></div>';
    html+='<div class="dm"><div class="v">'+m["多单率"]+'%</div><div class="l">多单率(≥2单)</div></div>';
    html+='<div class="dm"><div class="v">'+m["跨月留存"]+'%</div><div class="l">跨月留存(≥2月)</div></div>';
    html+='<div class="dm"><div class="v">'+m["1→6月留存"]+'%</div><div class="l">1→6月留存</div></div>';
    html+='<div class="dm"><div class="v">'+m["Top20贡献"]+'%</div><div class="l">Top20%贡献</div></div>';
    html+='<div class="dm"><div class="v">'+m["Q2vsQ1趋势"]+'%</div><div class="l">Q2vsQ1趋势</div></div>';
    html+='<div class="dm"><div class="v">'+fnum(m["直播场次"])+'</div><div class="l">直播场次</div></div>';
    html+='<div class="dm"><div class="v">'+m["15min留存"]+'%</div><div class="l">15min留存率</div></div>';
    html+='<div class="dm"><div class="v">'+m["观看转化"]+'%</div><div class="l">观看→下单转化</div></div>';
    html+='</div>';

    if(s.risks!=="无明显风险"){
      html+='<div class="detail-notes" style="color:#c53030;">⚠️ '+s.risks+'</div>';
    }
    if(s.strengths){
      html+='<div class="detail-notes" style="color:#3b9c6e;">✅ '+s.strengths+'</div>';
    }
    html+='<div class="detail-notes" style="font-weight:500;color:#2d6a7e;">'+s.recommendation+'</div>';
    html+='</div>'; // store-detail
  });

  document.getElementById("storeList").innerHTML=html;
  expandedStore=null;
}

function toggleDetail(idx, name){
  var row=document.getElementById("row-"+idx);
  var detail=document.getElementById("detail-"+idx);

  // Close previously expanded
  if(expandedStore!==null && expandedStore!==idx){
    var prevRow=document.getElementById("row-"+expandedStore);
    var prevDetail=document.getElementById("detail-"+expandedStore);
    if(prevRow) prevRow.classList.remove("expanded");
    if(prevDetail) prevDetail.classList.remove("show");
  }

  if(expandedStore===idx){
    row.classList.remove("expanded");
    detail.classList.remove("show");
    expandedStore=null;
  } else {
    row.classList.add("expanded");
    detail.classList.add("show");
    expandedStore=idx;
    // Scroll into view
    detail.scrollIntoView({behavior:"smooth",block:"nearest"});
  }
}

renderList();
</script>
